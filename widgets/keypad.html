<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator — V3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    .container { max-width: 360px; width: 100%; }

    h1 {
      text-align: center;
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* The display area shows the local expression on the top, the result on
       the bottom, and a small badge telling the user which "path" produced
       the result so the educational point is visible. */
    .display {
      background: #0f3460;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .expr {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 1.4rem;
      color: #fff;
      word-break: break-all;
      min-height: 1.6rem;
    }
    .expr .placeholder { color: #6f7a90; }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
      margin-top: 8px;
    }
    .result {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 1.6rem;
      color: #4ade80;
      text-align: right;
      flex: 1;
      word-break: break-all;
    }
    .result.error { color: #ff6b6b; }
    .result.muted { color: #5a6680; }

    .badge {
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      background: #16213e;
      color: #9aa6c0;
      white-space: nowrap;
      align-self: flex-end;
      margin-bottom: 4px;
    }
    .badge.local    { background: #16213e; color: #9aa6c0; }
    .badge.server   { background: #0e3b2a; color: #6ee7b7; }
    .badge.llm      { background: #2a1d4d; color: #c4b5fd; }
    .badge.error    { background: #4a1515; color: #ff9b9b; }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    /* V2: scientific row sits above the arithmetic grid. Five evenly
       spaced keys; arithmetic grid stays a clean 4-wide. */
    .sci-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    button.key {
      background: #243763;
      color: #fff;
      border: none;
      padding: 14px 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 500;
      transition: filter 0.1s ease, transform 0.05s ease;
      font-family: inherit;
    }
    button.key:hover { filter: brightness(1.15); }
    button.key:active { transform: translateY(1px); }
    button.key.op    { background: #3a4d8c; }
    button.key.eq    { background: #16a34a; grid-column: span 2; }
    button.key.util  { background: #4a4a5e; }
    /* V2: scientific function keys (sqrt, x^y, x^2, log10, ln) live in
       their own row above the arithmetic keypad. They're tinted distinctly
       so the user sees they're a different class of operation — most are
       direct unary calls to a primitive tool, and x^y introduces a new
       binary operator that resolves to the power primitive on `=`. */
    button.key.sci   {
      background: #2a1d4d;
      color: #c4b5fd;
      font-size: 1rem;
    }
    button.key.sci:hover { background: #3d2a6e; }

    .hint {
      margin-top: 12px;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #9aa6c0;
      line-height: 1.4;
      display: none;
    }
    .hint.visible { display: block; }
    .hint code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0f3460;
      padding: 1px 5px;
      border-radius: 4px;
      color: #c4b5fd;
    }

    .legend {
      margin-top: 12px;
      font-size: 0.72rem;
      color: #6f7a90;
      line-height: 1.4;
    }
    .legend strong { color: #aab3c8; font-weight: 600; }

    /* V2: ordered list of LLM-decomposed tool calls. Each step shows
       what the LLM asked the server to compute, in order, so the
       teaching point ("the LLM did the precedence, the server did the
       arithmetic") is visible. */
    .steps {
      margin-top: 14px;
      background: #16213e;
      border-radius: 10px;
      padding: 12px;
      display: none;
    }
    .steps.visible { display: block; }
    .steps-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .steps-title {
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #c4b5fd;
      font-weight: 600;
    }
    .steps-clear {
      background: transparent;
      color: #6f7a90;
      border: 1px solid #2a3558;
      padding: 3px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      font-family: inherit;
    }
    .steps-clear:hover { color: #c4b5fd; border-color: #4d3d8a; }
    .steps-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .step {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 8px;
      align-items: baseline;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
      padding: 6px 8px;
      background: #0f3460;
      border-radius: 6px;
    }
    .step .idx {
      color: #c4b5fd;
      font-weight: 600;
    }
    .step .call { color: #e6e8ef; word-break: break-word; }
    .step .arrow { color: #6f7a90; padding: 0 4px; }
    .step .val { color: #6ee7b7; font-weight: 600; }
    .step.err .val { color: #ff9b9b; }
    .step.err .call { color: #ffd0d0; }
    .step .err-code {
      font-size: 0.7rem;
      color: #ff9b9b;
      grid-column: 2 / 4;
      margin-top: 2px;
    }

    /* V3: interpretation panel — visualizes the natural-language teaching
       loop. The user types a word problem in chat; the LLM emits an
       interpretation (phrasing → math) and then the ordered tool calls.
       The widget renders the interpretation above the step list so the
       full path is legible:
         user phrasing  →  interpreted math  →  tool calls  →  final answer */
    .interp {
      margin-top: 14px;
      background: #16213e;
      border-radius: 10px;
      padding: 12px;
      display: none;
      border-left: 3px solid #c4b5fd;
    }
    .interp.visible { display: block; }
    .interp-title {
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #c4b5fd;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .interp-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 8px;
      align-items: baseline;
      font-size: 0.82rem;
      padding: 4px 0;
    }
    .interp-row + .interp-row { border-top: 1px solid #1f2a4d; }
    .interp-label {
      color: #6f7a90;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .interp-value {
      color: #e6e8ef;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      word-break: break-word;
    }
    .interp-value.phrasing {
      color: #fde68a;
      font-family: inherit;
      font-style: italic;
    }
    .interp-value.concept {
      color: #c4b5fd;
      font-family: inherit;
    }
    .interp-value.expr {
      color: #6ee7b7;
    }
    .interp-value.final-answer {
      color: #6ee7b7;
      font-weight: 600;
      font-size: 1rem;
    }
    .interp-value.pending {
      color: #6f7a90;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MCP Calculator — V3</h1>

    <div class="display" aria-live="polite">
      <div id="expr" class="expr"><span class="placeholder">tap keys&hellip;</span></div>
      <div class="result-row">
        <span id="badge" class="badge local">local</span>
        <div id="result" class="result muted">&mdash;</div>
      </div>
    </div>

    <!-- V2: scientific function keys. sqrt / x^2 / log10 / ln are unary
         one-shot calls to the matching server primitive (sqrt, power,
         log). x^y is a new binary operator (`^`) that the equals key
         routes to the `power` tool. Arbitrary log bases and multi-step
         expressions still belong in chat — see the `?` key for guidance. -->
    <div class="sci-row">
      <button class="key sci" data-action="sqrt" title="square root">&radic;x</button>
      <button class="key sci" data-action="square" title="square (x^2)">x&sup2;</button>
      <button class="key sci" data-op="^" title="x to the y (power)">x<sup>y</sup></button>
      <button class="key sci" data-action="log10" title="log base 10">log&#8321;&#8320;</button>
      <button class="key sci" data-action="ln" title="natural log (base e)">ln</button>
    </div>

    <div class="keypad">
      <button class="key util" data-action="clear">C</button>
      <button class="key util" data-action="back">&larr;</button>
      <button class="key util" data-action="negate">+/-</button>
      <button class="key op" data-op="/">&divide;</button>

      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
      <button class="key op" data-op="*">&times;</button>

      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
      <button class="key op" data-op="-">&minus;</button>

      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
      <button class="key op" data-op="+">+</button>

      <button class="key" data-digit="0">0</button>
      <button class="key" data-digit=".">.</button>
      <button class="key eq" data-action="equals">=</button>
    </div>

    <div id="hint" class="hint"></div>

    <div class="legend">
      <strong>Three paths.</strong>
      <span style="color:#9aa6c0">Local</span> = keypad updates the display only.
      <span style="color:#6ee7b7">Server</span> = widget called a primitive MCP tool.
      <span style="color:#c4b5fd">LLM</span> = the chat LLM decomposed the request and called tools.
    </div>

    <!-- V3: interpretation panel — captures the natural-language teaching
         loop for word problems like "what is the hypotenuse of a right
         triangle with sides 5 and 12?". Populated by the host pushing
         `ui/notifications/interpretation` *before* it dispatches the
         primitive tool calls. The widget displays four rows:
           phrasing  — the user's original natural-language question
           concept   — the math the LLM recognized (e.g. Pythagorean theorem)
           expression — the equivalent symbolic math
           answer    — populated when the LLM marks the run complete
         The server still doesn't parse phrasing — interpretation lives in
         the LLM and is *displayed* by the widget. -->
    <div id="interp" class="interp" aria-live="polite">
      <div class="interp-title">Interpretation</div>
      <div id="interp-phrasing-row" class="interp-row">
        <span class="interp-label">phrasing</span>
        <span id="interp-phrasing" class="interp-value phrasing"></span>
      </div>
      <div id="interp-concept-row" class="interp-row">
        <span class="interp-label">concept</span>
        <span id="interp-concept" class="interp-value concept"></span>
      </div>
      <div id="interp-expression-row" class="interp-row">
        <span class="interp-label">expression</span>
        <span id="interp-expression" class="interp-value expr"></span>
      </div>
      <div id="interp-answer-row" class="interp-row">
        <span class="interp-label">answer</span>
        <span id="interp-answer" class="interp-value final-answer pending">computing&hellip;</span>
      </div>
    </div>

    <!-- V2: visualizes the LLM-decomposed step list. Each entry is a
         primitive tool call the chat LLM made while reasoning about an
         expression like (3 + 5)^2 / log10(1000). The list grows in
         real time as the host pushes ui/notifications/tool-result. -->
    <div id="steps" class="steps" aria-live="polite">
      <div class="steps-header">
        <span class="steps-title">Tool calls (LLM decomposition)</span>
        <button id="steps-clear" class="steps-clear" type="button">clear</button>
      </div>
      <ol id="steps-list" class="steps-list"></ol>
    </div>
  </div>

  <script type="application/json" id="initial-data">{"version":"1.0.0"}</script>
  <script type="module">
    // The widget runs as a real MCP App: it imports the official SDK and
    // talks to the host via App.connect / App.callServerTool / App.on*
    // handlers. The previous incarnation used a legacy `window.mcpBridge`
    // surface and a raw `window.addEventListener('message', ...)` listener;
    // both are gone (replaced by the SDK) except for two narrow fallbacks
    // documented inline below.
    //
    // The SDK is loaded over esm.sh so the widget remains a single, raw
    // HTML resource (the server include_str!s it as-is). No bundler step
    // is required to deploy — that keeps the educational milestone honest:
    // V1/V2/V3 are just `widgets/keypad.html`.
    import { App } from "https://esm.sh/@modelcontextprotocol/ext-apps@1.7.1";

    const app = new App({
      name: "scientific-calculator",
      version: "1.0.0",
    });

    // ---------------------------------------------------------------------
    // Local widget state. The chat transcript is the history; the widget
    // owns only "the current calculator moment".
    // ---------------------------------------------------------------------
    const state = {
      // Tokens the user has typed so far. Each token is either a number
      // string (e.g. "12.5") or one of "+", "-", "*", "/".
      tokens: [],
      // The last result that was displayed, and where it came from.
      lastResult: null,    // string | null
      lastBadge: 'local',  // 'local' | 'server' | 'llm' | 'error'
      // V2: ordered list of LLM-decomposed tool calls. Each entry is the
      // structuredContent the host pushed via app.ontoolresult.
      // The widget visualizes this so the user can see "the LLM ordered
      // these primitives, the server computed each one".
      steps: [],
      // V3: the natural-language interpretation the LLM emitted *before*
      // calling tools. The widget displays this so the user sees the
      // teaching loop: phrasing → interpreted concept → tool calls →
      // final answer. Shape:
      //   { phrasing?, concept?, expression?, answer?, complete? }
      // Populated by ui/notifications/interpretation and updated again
      // when the LLM signals completion (with the final answer).
      interpretation: null,
    };

    // ---------------------------------------------------------------------
    // DOM
    // ---------------------------------------------------------------------
    const exprEl = document.getElementById('expr');
    const resultEl = document.getElementById('result');
    const badgeEl = document.getElementById('badge');
    const hintEl = document.getElementById('hint');
    const stepsEl = document.getElementById('steps');
    const stepsListEl = document.getElementById('steps-list');
    const stepsClearBtn = document.getElementById('steps-clear');
    const interpEl = document.getElementById('interp');
    const interpPhrasingEl = document.getElementById('interp-phrasing');
    const interpConceptEl = document.getElementById('interp-concept');
    const interpExpressionEl = document.getElementById('interp-expression');
    const interpAnswerEl = document.getElementById('interp-answer');
    const interpPhrasingRow = document.getElementById('interp-phrasing-row');
    const interpConceptRow = document.getElementById('interp-concept-row');
    const interpExpressionRow = document.getElementById('interp-expression-row');
    const interpAnswerRow = document.getElementById('interp-answer-row');

    // Map UI ops -> server tool name.
    //   V1: 4 binary arithmetic primitives.
    //   V2: '^' (power) — added so the keypad can express `a ^ b` and route
    //   it through the `power(base, exponent)` tool when `=` is pressed.
    const TOOL_FOR_OP = {
      '+': 'add',
      '-': 'subtract',
      '*': 'multiply',
      '/': 'divide',
      '^': 'power',
    };
    const SYMBOL_FOR_OP = { '+': '+', '-': '−', '*': '×', '/': '÷', '^': '^' };
    // V2: power expects { base, exponent } rather than { a, b }, so binary
    // dispatch needs to know which key-name shape each op expects.
    const ARGS_FOR_OP = {
      '+': (a, b) => ({ a, b }),
      '-': (a, b) => ({ a, b }),
      '*': (a, b) => ({ a, b }),
      '/': (a, b) => ({ a, b }),
      '^': (a, b) => ({ base: a, exponent: b }),
    };

    // ---------------------------------------------------------------------
    // PATH 1 — Local UI updates. Pure DOM/state, no tool calls.
    // ---------------------------------------------------------------------
    function pressDigit(d) {
      const last = state.tokens[state.tokens.length - 1];
      if (last === undefined || isOperator(last)) {
        // Start a new number.
        if (d === '.') {
          state.tokens.push('0.');
        } else {
          state.tokens.push(d);
        }
      } else {
        // Extend the current number, but only allow one decimal point per
        // number.
        if (d === '.' && last.includes('.')) return;
        state.tokens[state.tokens.length - 1] = last + d;
      }
      // Pressing a digit invalidates the previous result; revert badge to
      // "local" so the user sees that new keypresses are pure UI updates.
      clearResult('local');
      render();
    }

    function pressOp(op) {
      if (state.tokens.length === 0) return;
      const last = state.tokens[state.tokens.length - 1];
      if (isOperator(last)) {
        // Replace pending operator instead of stacking.
        state.tokens[state.tokens.length - 1] = op;
      } else {
        state.tokens.push(op);
      }
      clearResult('local');
      render();
    }

    function pressClear() {
      state.tokens = [];
      clearResult('local');
      hideHint();
      render();
    }

    function pressBack() {
      const last = state.tokens[state.tokens.length - 1];
      if (last === undefined) return;
      if (isOperator(last) || last.length <= 1) {
        state.tokens.pop();
      } else {
        state.tokens[state.tokens.length - 1] = last.slice(0, -1);
      }
      clearResult('local');
      render();
    }

    // ---------------------------------------------------------------------
    // PATH 3 — MCP server computation. The widget *itself* is the caller.
    //
    // V1 only handles the simple `number OP number` shape — that's the
    // smallest meaningful demonstration of "the widget called a primitive
    // tool." Anything more complex (precedence, multiple operators, a
    // unary +/- in the middle) is the LLM's job (V2), so we surface a hint
    // that points the user to the chat.
    // ---------------------------------------------------------------------
    async function pressEquals() {
      // The +/- key handles single-operand negate locally, so equals on a
      // single number is a no-op.
      if (state.tokens.length === 0) return;
      if (state.tokens.length === 1) {
        // Show the bare number as the result.
        setResult(state.tokens[0], 'local');
        return;
      }

      // V1 handles only "a OP b".
      const matchesBinary =
        state.tokens.length === 3 &&
        !isOperator(state.tokens[0]) &&
        isOperator(state.tokens[1]) &&
        !isOperator(state.tokens[2]);

      if (!matchesBinary) {
        showHint(
          'The keypad only computes <code>a OP b</code> directly. For ' +
          '<code>' + tokensToExpression(state.tokens) + '</code>, ask the chat ' +
          '(e.g. "compute ' + tokensToExpression(state.tokens) + '") — the LLM ' +
          'will decompose it into ordered primitive tool calls and the steps ' +
          'will appear below.'
        );
        return;
      }

      const a = parseFloat(state.tokens[0]);
      const op = state.tokens[1];
      const b = parseFloat(state.tokens[2]);
      const tool = TOOL_FOR_OP[op];
      const argsFor = ARGS_FOR_OP[op];

      if (Number.isNaN(a) || Number.isNaN(b) || !tool || !argsFor) {
        setError('Invalid expression.');
        return;
      }

      try {
        const out = await callTool(tool, argsFor(a, b));
        applyToolResult(out, /*fromLLM=*/false);
      } catch (e) {
        setError(e && e.message ? e.message : String(e));
      }
    }

    // The +/- key uses the negate primitive when the current number is
    // complete. If the user hasn't typed anything yet, do nothing.
    async function pressNegate() {
      const last = state.tokens[state.tokens.length - 1];
      if (last === undefined || isOperator(last)) return;
      const x = parseFloat(last);
      if (Number.isNaN(x)) return;
      try {
        const out = await callTool('negate', { x });
        if (out && out.ok === 'true') {
          // Replace the last number with the negated value so further
          // arithmetic uses the new sign.
          state.tokens[state.tokens.length - 1] = String(out.result);
          render();
        }
        applyToolResult(out, /*fromLLM=*/false);
      } catch (e) {
        setError(e && e.message ? e.message : String(e));
      }
    }

    // ---------------------------------------------------------------------
    // V2 — scientific function keys.
    //
    // These keys take whatever number the user has just typed and route it
    // through one of the V2 server primitives directly (`sqrt`, `power`,
    // `log`). They keep the same teaching contract as the arithmetic keys:
    // the widget owns the local expression state, and a dedicated press
    // hands off to a primitive tool — the result still flows back through
    // applyToolResult so the badge shows `server` and any structured error
    // (e.g. `domain_error` for sqrt(-1)) is rendered the same way.
    //
    // We deliberately don't add an arbitrary-base log key. Instead, the
    // common bases (10, e) are exposed as dedicated keys so the (x, base)
    // pair is visible in the call. For other bases, the user is pointed
    // to the chat — the LLM will issue `log(x, base)` directly.
    // ---------------------------------------------------------------------
    function currentNumber() {
      const last = state.tokens[state.tokens.length - 1];
      if (last === undefined || isOperator(last)) return null;
      const x = parseFloat(last);
      return Number.isFinite(x) ? x : null;
    }

    async function callUnaryOnCurrent(toolName, args, opLabel) {
      const x = currentNumber();
      if (x === null) {
        showHint(
          'Type a number first, then press <code>' + escapeHtml(opLabel) +
          '</code>. (' + escapeHtml(opLabel) +
          ' is a one-shot call to the <code>' + escapeHtml(toolName) +
          '</code> primitive.)'
        );
        return;
      }
      try {
        const out = await callTool(toolName, args);
        applyToolResult(out, /*fromLLM=*/false);
      } catch (e) {
        setError(e && e.message ? e.message : String(e));
      }
    }

    async function pressSqrt() {
      const x = currentNumber();
      if (x === null) {
        showHint('Type a number first, then press <code>√x</code>.');
        return;
      }
      await callUnaryOnCurrent('sqrt', { x }, '√x');
    }

    async function pressSquare() {
      const x = currentNumber();
      if (x === null) {
        showHint('Type a number first, then press <code>x²</code>.');
        return;
      }
      // x² is a shortcut for power(x, 2). Show it as the operation in
      // the headline so the user sees it routed to the `power` primitive.
      await callUnaryOnCurrent('power', { base: x, exponent: 2 }, 'x²');
    }

    async function pressLog10() {
      const x = currentNumber();
      if (x === null) {
        showHint(
          'Type a positive number first, then press <code>log₁₀</code>. ' +
          'For other bases, ask the chat (e.g. "compute log base 2 of 32") — ' +
          'the LLM will call <code>log(x, base)</code> directly.'
        );
        return;
      }
      await callUnaryOnCurrent('log', { x, base: 10 }, 'log₁₀');
    }

    async function pressLn() {
      const x = currentNumber();
      if (x === null) {
        showHint('Type a positive number first, then press <code>ln</code>.');
        return;
      }
      // ln(x) ⇒ log(x, e). Routing through the same `log` primitive
      // keeps the server flat (no `ln` tool) while the key label makes
      // the base explicit to the user.
      await callUnaryOnCurrent('log', { x, base: Math.E }, 'ln');
    }

    // ---------------------------------------------------------------------
    // PATH 2 — LLM-driven path.
    //
    // When the user types math in the chat, the host LLM calls a primitive
    // tool. The MCP Apps SDK invokes `app.ontoolresult` with the full
    // CallToolResult; we extract `structuredContent` and render it just
    // like a server-path result, but tagged "llm".
    // ---------------------------------------------------------------------

    // ---------------------------------------------------------------------
    // Helpers
    // ---------------------------------------------------------------------
    function isOperator(tok) {
      // V2: '^' is recognized so the keypad accepts `a ^ b` and pressEquals
      // can route it through the `power` primitive.
      return tok === '+' || tok === '-' || tok === '*' || tok === '/' || tok === '^';
    }

    function tokensToExpression(tokens) {
      return tokens.map(t => isOperator(t) ? ' ' + SYMBOL_FOR_OP[t] + ' ' : t).join('');
    }

    function render() {
      if (state.tokens.length === 0) {
        exprEl.innerHTML = '<span class="placeholder">tap keys&hellip;</span>';
      } else {
        exprEl.textContent = tokensToExpression(state.tokens);
      }
    }

    function clearResult(badge) {
      state.lastResult = null;
      state.lastBadge = badge || 'local';
      resultEl.textContent = '—';
      resultEl.className = 'result muted';
      badgeEl.textContent = badge || 'local';
      badgeEl.className = 'badge ' + (badge || 'local');
      hideHint();
    }

    function setResult(text, badge) {
      state.lastResult = text;
      state.lastBadge = badge;
      resultEl.textContent = text;
      resultEl.className = 'result' + (badge === 'error' ? ' error' : '');
      badgeEl.textContent =
        badge === 'llm' ? 'llm' : badge === 'server' ? 'server' : badge;
      badgeEl.className = 'badge ' + badge;
    }

    function setError(msg) {
      setResult(msg, 'error');
    }

    /**
     * Render a structured CalcOutput on the display.
     *
     * The output shape is:
     *   { ok: "true", op, inputs: [...], result, display }
     * or:
     *   { ok: "false", op, inputs: [...], code, message }
     */
    function applyToolResult(out, fromLLM) {
      if (!out) return;
      const badge = fromLLM ? 'llm' : 'server';

      // Discriminator is "true"/"false" string because of the Rust enum
      // tagging. Be defensive about the shape coming from any host.
      const ok = out.ok === true || out.ok === 'true' || out.success === true;
      const isErr = out.ok === false || out.ok === 'false' || out.code;

      // V2: any LLM-driven tool call (success or error) is appended to
      // the visible step list. Server-path calls (the widget's own
      // app.callServerTool) are NOT recorded — those came from a single
      // user click, not from the LLM's reasoning.
      if (fromLLM) {
        appendStep(out);
      }

      if (ok) {
        const display = out.display !== undefined ? String(out.display)
                       : out.result !== undefined ? String(out.result)
                       : '';
        const opText = out.op
          ? out.op + '(' + (out.inputs || []).join(', ') + ')'
          : '';
        // When the LLM drove the call, we didn't have local tokens; show
        // what the server actually computed in the expression line so the
        // user can see "the chat asked for add(1, 1)".
        if (fromLLM && opText) {
          exprEl.textContent = opText;
        }
        setResult(display, badge);
        return;
      }

      if (isErr) {
        const code = out.code || 'error';
        const message = out.message || code;
        setResult(message, 'error');
        return;
      }

      // Unknown shape — render best-effort.
      try {
        setResult(JSON.stringify(out), badge);
      } catch (_) {
        setResult('(unrecognized result)', 'error');
      }
    }

    // V2: step-list rendering for the LLM decomposition path.
    function appendStep(out) {
      state.steps.push(out);
      renderSteps();
    }

    function clearSteps() {
      state.steps = [];
      // V3: clearing also retires the current interpretation, since the
      // step list and the interpretation panel are two views of the same
      // run. The user gets a clean slate for the next word problem.
      state.interpretation = null;
      renderSteps();
      renderInterpretation();
    }

    // V3: merge an interpretation envelope into widget state. The host
    // may send several envelopes for one run — typically one when it
    // first parses the phrasing (phrasing/concept/expression filled, no
    // answer yet) and another when the run completes (answer filled,
    // `complete: true`). Each call is shallow-merged so a partial update
    // doesn't blow away earlier fields.
    function applyInterpretation(env) {
      if (!env || typeof env !== 'object') return;
      const merged = Object.assign({}, state.interpretation || {}, env);
      state.interpretation = merged;
      renderInterpretation();
    }

    function renderInterpretation() {
      const i = state.interpretation;
      if (!i || (!i.phrasing && !i.concept && !i.expression && !i.answer)) {
        interpEl.classList.remove('visible');
        return;
      }
      interpEl.classList.add('visible');

      // Toggle each row's visibility independently — we only want to
      // show the rows the host actually populated, so the panel stays
      // tight when only some fields are known.
      function setRow(rowEl, valueEl, raw, classes) {
        if (raw === undefined || raw === null || raw === '') {
          rowEl.style.display = 'none';
          return;
        }
        rowEl.style.display = '';
        valueEl.textContent = String(raw);
        valueEl.className = 'interp-value ' + (classes || '');
      }

      setRow(interpPhrasingRow, interpPhrasingEl, i.phrasing, 'phrasing');
      setRow(interpConceptRow, interpConceptEl, i.concept, 'concept');
      setRow(interpExpressionRow, interpExpressionEl, i.expression, 'expr');

      // The answer row is special: it's always visible once we have an
      // interpretation, but shows a "computing…" placeholder until the
      // host sends `answer` (typically with `complete: true`). This is
      // the "final answer" leg of the teaching loop.
      interpAnswerRow.style.display = '';
      if (i.answer !== undefined && i.answer !== null && i.answer !== '') {
        interpAnswerEl.textContent = String(i.answer);
        interpAnswerEl.className = 'interp-value final-answer';
      } else {
        interpAnswerEl.textContent = 'computing…';
        interpAnswerEl.className = 'interp-value final-answer pending';
      }
    }

    function renderSteps() {
      if (!state.steps.length) {
        stepsEl.classList.remove('visible');
        stepsListEl.innerHTML = '';
        return;
      }
      stepsEl.classList.add('visible');
      const html = state.steps.map((s, i) => stepHtml(s, i + 1)).join('');
      stepsListEl.innerHTML = html;
    }

    function stepHtml(out, idx) {
      const ok = out && (out.ok === true || out.ok === 'true');
      const op = (out && out.op) || 'unknown';
      const inputs = (out && out.inputs) || [];
      const call = escapeHtml(op + '(' + inputs.map(formatNum).join(', ') + ')');
      if (ok) {
        const value = out.display !== undefined ? String(out.display)
                     : out.result !== undefined ? String(out.result)
                     : '';
        return (
          '<li class="step">'
          + '<span class="idx">' + idx + '.</span>'
          + '<span class="call">' + call + '</span>'
          + '<span><span class="arrow">→</span><span class="val">' + escapeHtml(value) + '</span></span>'
          + '</li>'
        );
      }
      const code = (out && out.code) || 'error';
      const msg = (out && out.message) || code;
      return (
        '<li class="step err">'
        + '<span class="idx">' + idx + '.</span>'
        + '<span class="call">' + call + '</span>'
        + '<span><span class="arrow">→</span><span class="val">error</span></span>'
        + '<span class="err-code">' + escapeHtml(code) + ': ' + escapeHtml(msg) + '</span>'
        + '</li>'
      );
    }

    function formatNum(n) {
      if (typeof n !== 'number') return String(n);
      if (!Number.isFinite(n)) return String(n);
      // Mirror the Rust format_number behavior closely enough for display.
      if (Number.isInteger(n)) return String(n);
      return String(Number(n.toFixed(10)));
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showHint(html) {
      hintEl.innerHTML = html;
      hintEl.classList.add('visible');
    }
    function hideHint() {
      hintEl.classList.remove('visible');
    }

    // ---------------------------------------------------------------------
    // MCP Apps SDK — tool invocation goes through app.callServerTool.
    // ---------------------------------------------------------------------
    async function callTool(name, args) {
      const out = await app.callServerTool({ name, arguments: args });
      // app.callServerTool may return the full CallToolResult, a bare
      // CalcOutput, or a CallToolResult whose payload is JSON-stringified
      // inside content[0].text. normalizeToolResult collapses all of
      // these into the structured CalcOutput applyToolResult expects.
      return normalizeToolResult(out);
    }

    /**
     * Coerce any of the result shapes a host might hand us into the bare
     * CalcOutput payload `applyToolResult` renders. Accepted shapes:
     *
     *   1. CalcOutput directly: { ok: "true", op, inputs, result, display }
     *   2. CallToolResult.structuredContent → CalcOutput
     *   3. CallToolResult.content[0].text containing JSON-stringified
     *      CalcOutput (the spec text channel)
     *   4. CallToolResult.content[0].text containing a JSON object that
     *      itself has structuredContent / content (double-wrapped — seen
     *      when a host forwards the wire envelope as text)
     *
     * Returns the original value unchanged when no extraction succeeds,
     * letting applyToolResult fall through to its "unknown shape" branch.
     */
    function normalizeToolResult(out) {
      if (!out || typeof out !== 'object') return out;

      // (1) Already a CalcOutput.
      if (out.ok === true || out.ok === 'true' || out.ok === false || out.ok === 'false') {
        return out;
      }

      // (2) CallToolResult with structuredContent.
      if (out.structuredContent && typeof out.structuredContent === 'object') {
        return normalizeToolResult(out.structuredContent);
      }

      // (3) and (4) — text-channel payload. Pull the first text block and
      // try to parse it as JSON. If it parses to another result envelope,
      // recurse; if it parses to a CalcOutput, return it.
      const content = Array.isArray(out.content) ? out.content : null;
      if (content && content.length) {
        const block = content.find(b => b && b.type === 'text' && typeof b.text === 'string');
        if (block) {
          try {
            const parsed = JSON.parse(block.text);
            return normalizeToolResult(parsed);
          } catch (_) {
            // Not JSON — fall through.
          }
        }
      }

      return out;
    }

    // ---------------------------------------------------------------------
    // SDK handlers — the spec requires onteardown / ontoolinput /
    // ontoolcancelled / onerror / ontoolresult to be set BEFORE connect()
    // because the host queues notifications and replays them on connect.
    // ---------------------------------------------------------------------
    app.onteardown = async () => {
      // The widget is stateless across runs (chat transcript is the
      // history). Nothing to flush; resolving with {} is the canonical
      // teardown ack.
      return {};
    };

    app.ontoolinput = (params) => {
      // Called when the LLM is about to invoke a tool but hasn't sent the
      // result yet. The keypad doesn't render an in-flight state today;
      // keep the handler registered so the SDK contract is satisfied and
      // a future "tool starting…" affordance has a hook to attach to.
    };

    app.ontoolcancelled = (params) => {
      console.debug('[calculator] tool cancelled:', params && params.reason);
    };

    // The App class in @modelcontextprotocol/ext-apps@1.7.1 doesn't
    // *fire* onerror itself, but the spec/validator looks for the
    // assignment, and any future SDK bump that wires it up will land
    // here without a code change.
    app.onerror = (err) => {
      console.error('[calculator] App error:', err);
      setError(err && err.message ? err.message : String(err));
    };

    app.ontoolresult = (result) => {
      // Replaces the legacy `window.addEventListener('message', ...)`
      // listener filtered on `ui/notifications/tool-result`. Some hosts
      // hand us the full CallToolResult with structuredContent; others
      // forward only the text channel (content[0].text containing
      // JSON-stringified CalcOutput). normalizeToolResult collapses
      // every accepted shape into the bare CalcOutput payload.
      const payload = normalizeToolResult(result);
      if (payload) {
        applyToolResult(payload, /*fromLLM=*/true);
      }
    };

    // Optional, but cheap and useful: respond to host theme switches
    // without requiring a full reconnect.
    app.onhostcontextchanged = (partial) => {
      if (partial && partial.theme) {
        applyTheme(partial.theme);
      }
    };

    // ---------------------------------------------------------------------
    // V3 — custom interpretation envelope.
    //
    // The migration target SDK (@modelcontextprotocol/ext-apps@1.7.1) does
    // NOT expose a typed handler for arbitrary host-side notifications, so
    // there's no `app.oninterpretation` we can register. The host pushes
    // `ui/notifications/interpretation` as a JSON-RPC notification that
    // arrives via the same postMessage channel the SDK uses, so we keep a
    // narrowly scoped raw `message` listener that ONLY accepts that
    // method. Everything else is left to the SDK.
    //
    // Limitation: documented in README and examples/v3-natural-language-math.md.
    // If a future SDK release adds a custom-notifications handler we'll
    // collapse this into the SDK and delete the listener.
    // ---------------------------------------------------------------------
    window.addEventListener('message', (event) => {
      const msg = event && event.data;
      if (!msg || msg.jsonrpc !== '2.0') return;
      if (msg.method !== 'ui/notifications/interpretation') return;
      applyInterpretation(msg.params || {});
    });

    // ---------------------------------------------------------------------
    // Theme — read once after connect resolves, then react to
    // host-context updates via app.onhostcontextchanged.
    // ---------------------------------------------------------------------
    function applyTheme(theme) {
      const t = theme || 'dark';
      // Replace any previous theme- class without touching unrelated body
      // classes.
      document.body.className = document.body.className
        .split(/\s+/)
        .filter(c => c && !c.startsWith('theme-'))
        .concat(['theme-' + t])
        .join(' ');
      if (t === 'light') {
        document.body.style.background = '#f5f5f5';
        document.body.style.color = '#222';
      } else {
        document.body.style.background = '';
        document.body.style.color = '';
      }
    }

    // ---------------------------------------------------------------------
    // Wire up the keypad
    // ---------------------------------------------------------------------
    function init() {
      document.querySelectorAll('button.key').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.dataset.digit !== undefined) {
            pressDigit(btn.dataset.digit);
          } else if (btn.dataset.op !== undefined) {
            pressOp(btn.dataset.op);
          } else {
            const action = btn.dataset.action;
            if (action === 'clear') pressClear();
            else if (action === 'back') pressBack();
            else if (action === 'equals') pressEquals();
            else if (action === 'negate') pressNegate();
            // V2: scientific function keys.
            else if (action === 'sqrt') pressSqrt();
            else if (action === 'square') pressSquare();
            else if (action === 'log10') pressLog10();
            else if (action === 'ln') pressLn();
          }
        });
      });

      stepsClearBtn.addEventListener('click', clearSteps);

      // Default to dark until connect() resolves and tells us otherwise.
      applyTheme('dark');

      render();
    }

    // ---------------------------------------------------------------------
    // Boot — run init() to wire DOM, then app.connect() LAST so the SDK
    // can replay any queued notifications into our handlers.
    // app.connect() with default {autoResize: true} sets up a
    // ResizeObserver, so we no longer need a manual notifyIntrinsicHeight.
    // ---------------------------------------------------------------------
    function boot() {
      init();
      app.connect()
        .then(() => {
          const ctx = app.getHostContext && app.getHostContext();
          applyTheme((ctx && ctx.theme) || 'dark');
        })
        .catch((err) => {
          // Connect failures are not fatal in preview/dev contexts where
          // there is no real host on the other end of postMessage. The
          // widget still renders a usable keypad; tool calls will surface
          // the failure via setError when the user presses =.
          console.warn('[calculator] app.connect() failed:', err);
        });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  </script>
</body>
</html>
